<!doctype html>
<html>
  <head>
    <title> Nail Inspo | Home</title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Nail Inspo</h1>
    </header>

    <div class="filters">
      <button onclick="filterNails('pink')">Pink</button>
      <button onclick="filterNails('white')">White</button>
      <button onclick="filterNails('classy')">Classy</button>
      <button onclick="filterNails('fun')">Fun</button>
    </div>
   
    <div id="card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>Nail Ttitle</h2>
        <img src="" alt="Nail Image" />
        <p>Nail Details</p>
      </div>
    </div>
    <div class="footer">
      <button onclick="quoteAlert()">Get A Quote!</button>
      <button onclick="removeLastCard()">Remove A Card!</button>
    </div>
 
    <div class="sparkles"></div>
 
  </body>
</html>
